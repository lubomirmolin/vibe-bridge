name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cargo fmt
        run: cargo fmt --manifest-path Cargo.toml --all --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml --workspace --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --manifest-path Cargo.toml --workspace --all-targets

      - name: Cargo test
        run: cargo test --manifest-path Cargo.toml --workspace --jobs 5

  mobile-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure Flutter
        run: flutter config --no-analytics

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze apps/mobile

      - name: Flutter test
        working-directory: apps/mobile
        run: flutter test --concurrency=5

      - name: Build Android APK
        working-directory: apps/mobile
        run: flutter build apk --release

  linux-shell:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure Flutter desktop
        run: flutter config --enable-linux-desktop --no-analytics

      - name: Flutter pub get
        working-directory: apps/linux-shell
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/linux-shell
        run: flutter analyze

      - name: Flutter test
        working-directory: apps/linux-shell
        run: flutter test

      - name: Build Linux shell
        working-directory: apps/linux-shell
        run: flutter build linux --release

  mac-shell:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Run macOS unit tests
        run: |
          export MACOS_BUILD_ARCH="$(uname -m)"
          export CODEX_MOBILE_COMPANION_CARGO_BIN="$HOME/.cargo/bin/cargo"
          export CODEX_MOBILE_COMPANION_RUSTC_BIN="$HOME/.cargo/bin/rustc"
          xcodebuild test \
            -project apps/mac-shell/CodexMobileCompanion.xcodeproj \
            -scheme CodexMobileCompanion \
            -destination "platform=macOS,arch=${MACOS_BUILD_ARCH}" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Build macOS release app
        run: |
          export MACOS_BUILD_ARCH="$(uname -m)"
          export CODEX_MOBILE_COMPANION_CARGO_BIN="$HOME/.cargo/bin/cargo"
          export CODEX_MOBILE_COMPANION_RUSTC_BIN="$HOME/.cargo/bin/rustc"
          xcodebuild \
            -project apps/mac-shell/CodexMobileCompanion.xcodeproj \
            -scheme CodexMobileCompanion \
            -configuration Release \
            -destination "platform=macOS,arch=${MACOS_BUILD_ARCH}" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
