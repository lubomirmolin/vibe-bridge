name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: true
      matrix:
        target:
          - name: Android Release
            id: android
            runner: ubuntu-24.04
          - name: Linux Release
            id: linux
            runner: ubuntu-24.04
          - name: Mac Release
            id: macos
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-java@v4
        if: matrix.target.id == 'android'
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        if: matrix.target.id == 'android' || matrix.target.id == 'linux'
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        if: matrix.target.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure Flutter
        if: matrix.target.id == 'android'
        run: flutter config --no-analytics

      - name: Configure Flutter desktop
        if: matrix.target.id == 'linux'
        run: flutter config --enable-linux-desktop --no-analytics

      - name: Package Android release
        if: matrix.target.id == 'android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          REQUIRE_ANDROID_RELEASE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: ./scripts/release/package-android.sh

      - name: Package Linux shell
        if: matrix.target.id == 'linux'
        run: ./scripts/release/package-linux-shell.sh

      - name: Package standalone Linux bridge
        if: matrix.target.id == 'linux'
        run: ./scripts/release/package-bridge.sh linux

      - name: Package macOS shell
        if: matrix.target.id == 'macos'
        run: ./scripts/release/package-macos-shell.sh

      - name: Package standalone macOS bridge
        if: matrix.target.id == 'macos'
        run: ./scripts/release/package-bridge.sh macos

      - uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target.id }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    needs:
      - build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Determine release metadata
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            {
              echo "RELEASE_TAG=main-latest"
              echo "RELEASE_TITLE=main"
              echo "RELEASE_PRERELEASE=1"
              echo "RELEASE_NOTES<<EOF"
              echo "Automated build from \`main\`."
              echo
              echo "- Commit: \`${{ github.event.workflow_run.head_sha }}\`"
              echo "- CI Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
              echo "- Release Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "EOF"
            } >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            {
              echo "RELEASE_TAG=${GITHUB_REF_NAME}"
              echo "RELEASE_TITLE=${GITHUB_REF_NAME}"
              echo "RELEASE_PRERELEASE=0"
            } >> "${GITHUB_ENV}"
          else
            {
              echo "RELEASE_TAG=manual-${GITHUB_RUN_ID}"
              echo "RELEASE_TITLE=manual-${GITHUB_RUN_ID}"
              echo "RELEASE_PRERELEASE=1"
              echo "RELEASE_NOTES=Manual release run."
            } >> "${GITHUB_ENV}"
          fi

      - name: Install GitHub CLI
        run: |
          if command -v gh >/dev/null 2>&1; then
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y gh

      - name: Generate checksums
        run: sha256sum dist/* > dist/SHA256SUMS

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            if [ "${RELEASE_PRERELEASE}" = "1" ]; then
              gh release edit "${RELEASE_TAG}" \
                --title "${RELEASE_TITLE}" \
                --prerelease \
                --notes "${RELEASE_NOTES}"
            fi
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            if [ "${RELEASE_PRERELEASE}" = "1" ]; then
              gh release create "${RELEASE_TAG}" dist/* \
                --title "${RELEASE_TITLE}" \
                --prerelease \
                --notes "${RELEASE_NOTES}"
            else
              gh release create "${RELEASE_TAG}" dist/* --title "${RELEASE_TITLE}" --generate-notes
            fi
          fi
