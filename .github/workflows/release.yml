name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure Flutter
        run: flutter config --no-analytics

      - name: Package Android release
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          REQUIRE_ANDROID_RELEASE_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') && '1' || '0' }}
        run: ./scripts/release/package-android.sh

      - uses: actions/upload-artifact@v6
        with:
          name: release-android
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            ninja-build \
            pkg-config

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Configure Flutter desktop
        run: flutter config --enable-linux-desktop --no-analytics

      - name: Package Linux shell
        run: ./scripts/release/package-linux-shell.sh

      - name: Package standalone Linux bridge
        run: ./scripts/release/package-bridge.sh linux

      - uses: actions/upload-artifact@v6
        with:
          name: release-linux
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  build-macos:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v5

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Package macOS shell
        run: ./scripts/release/package-macos-shell.sh

      - name: Package standalone macOS bridge
        run: ./scripts/release/package-bridge.sh macos

      - uses: actions/upload-artifact@v6
        with:
          name: release-macos
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    needs:
      - build-android
      - build-linux
      - build-macos
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Determine release metadata
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            {
              echo "RELEASE_TAG=main-latest"
              echo "RELEASE_TITLE=main"
              echo "RELEASE_PRERELEASE=1"
              echo "RELEASE_NOTES<<EOF"
              echo "Automated build from \`main\`."
              echo
              echo "- Commit: \`${GITHUB_SHA}\`"
              echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo "EOF"
            } >> "${GITHUB_ENV}"
          else
            {
              echo "RELEASE_TAG=${GITHUB_REF_NAME}"
              echo "RELEASE_TITLE=${GITHUB_REF_NAME}"
              echo "RELEASE_PRERELEASE=0"
            } >> "${GITHUB_ENV}"
          fi

      - name: Install GitHub CLI
        run: |
          if command -v gh >/dev/null 2>&1; then
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y gh

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            if [ "${RELEASE_PRERELEASE}" = "1" ]; then
              gh release edit "${RELEASE_TAG}" \
                --title "${RELEASE_TITLE}" \
                --prerelease \
                --notes "${RELEASE_NOTES}"
            fi
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            if [ "${RELEASE_PRERELEASE}" = "1" ]; then
              gh release create "${RELEASE_TAG}" dist/* \
                --title "${RELEASE_TITLE}" \
                --prerelease \
                --notes "${RELEASE_NOTES}"
            else
              gh release create "${RELEASE_TAG}" dist/* --title "${RELEASE_TITLE}" --generate-notes
            fi
          fi
