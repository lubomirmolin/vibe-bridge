name: Rust CI

on:
  pull_request:
    paths:
      - "crates/**"
      - "shared/contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "crates/**"
      - "shared/contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cargo fmt
        run: cargo fmt --manifest-path Cargo.toml --all --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path Cargo.toml --workspace --all-targets -- -D warnings

      - name: Cargo check
        run: cargo check --manifest-path Cargo.toml --workspace --all-targets

      - name: Cargo test
        run: cargo test --manifest-path Cargo.toml --workspace --jobs 5
