name: CodexMobileCompanion
options:
  createIntermediateGroups: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  CodexMobileCompanion:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - target: CodexSpeechHelper
    postBuildScripts:
      - name: Embed bridge-server
        path: scripts/embed-bridge-server.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/bridge-server
      - name: Embed speech helper
        path: scripts/embed-speech-helper.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/CodexSpeechHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell
        PRODUCT_NAME: CodexMobileCompanion
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CodexMobileCompanion
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Codex Mobile Companion"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools

  CodexSpeechHelper:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SpeechHelper/Sources
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell.speechhelper
        PRODUCT_NAME: CodexSpeechHelper
        CODE_SIGNING_ALLOWED: NO

  CodexMobileCompanionTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: CodexMobileCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CodexMobileCompanion:
    build:
      targets:
        CodexMobileCompanion: all
        CodexMobileCompanionTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: CodexMobileCompanionTests
