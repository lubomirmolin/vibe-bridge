name: VibeBridgeCompanion
options:
  createIntermediateGroups: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    branch: main
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  VibeBridgeCompanion:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: CodexSpeechHelper
    postBuildScripts:
      - name: Embed bridge-server
        path: scripts/embed-bridge-server.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/bridge-server
      - name: Embed speech helper
        path: scripts/embed-speech-helper.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/bin/CodexSpeechHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell
        PRODUCT_NAME: VibeBridgeCompanion
        MARKETING_VERSION: 0.0.1
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Vibe Bridge Companion
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Vibe Bridge Companion"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools

  CodexSpeechHelper:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SpeechHelper/Sources
    dependencies:
      - package: FluidAudio
        product: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell.speechhelper
        PRODUCT_NAME: CodexSpeechHelper
        CODE_SIGNING_ALLOWED: NO

  VibeBridgeCompanionTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: VibeBridgeCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.mobile.companion.shell.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  VibeBridgeCompanion:
    build:
      targets:
        VibeBridgeCompanion: all
        VibeBridgeCompanionTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: VibeBridgeCompanionTests
