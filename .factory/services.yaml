commands:
  install: cd /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/apps/mobile && flutter pub get
  typecheck: cargo check --manifest-path /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/Cargo.toml --workspace --all-targets
  build: cargo build --manifest-path /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/Cargo.toml --workspace
  test: cargo test --manifest-path /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/Cargo.toml --workspace --jobs 5
  lint: cargo clippy --manifest-path /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/Cargo.toml --workspace --all-targets -- -D warnings
  flutter_analyze: cd /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/apps/mobile && flutter analyze
  flutter_test: cd /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/apps/mobile && flutter test --concurrency=5

services:
  codex_app_server:
    start: echo "Managed by bridge auto-spawn, do not start manually"
    stop: echo "Managed by bridge, do not stop manually"
    healthcheck: curl -sf http://127.0.0.1:4222/health 2>/dev/null || echo "codex health check not available via HTTP"
    port: 4222
    depends_on: []

  bridge_server:
    start: cargo run --manifest-path /Users/lubomirmolin/PhpstormProjects/codex-mobile-companion/Cargo.toml -p bridge-core -- --host 127.0.0.1 --port 3210 --codex-mode auto --state-directory /tmp/codex-mobile-companion-local-bridge
    stop: "lsof -ti :3210 | xargs kill 2>/dev/null || true"
    healthcheck: curl -sf http://127.0.0.1:3210/healthz
    port: 3210
    depends_on: [codex_app_server]

  android_emulator:
    start: $HOME/Library/Android/sdk/emulator/emulator -avd Pixel_6_Pro_API_34 -no-snapshot -no-boot-anim -gpu swiftshader_indirect &
    stop: "$HOME/Library/Android/sdk/platform-tools/adb -s emulator-5554 emu kill 2>/dev/null || true"
    healthcheck: $HOME/Library/Android/sdk/platform-tools/adb -s emulator-5554 shell getprop sys.boot_completed 2>/dev/null | grep -q 1
    port: 5554
    depends_on: []
